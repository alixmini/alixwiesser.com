<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Cottage</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1712;
    --bg-lighter: #2a2520;
    --text: #e8dcc8;
    --text-dim: #9a8e7a;
    --accent: #d4a056;
    --accent-dim: #a07830;
    --input-bg: #0f0d0a;
    --green: #7ab87a;
    --red: #c47a6a;

    /* Chatroom theme */
    --chat-bg: #050e0a;
    --chat-bg-alt: #0b1a13;
    --chat-pink: #f3a9c8;
    --chat-pink-soft: #f7c2d9;
    --chat-green: #c5f3c5;
    --chat-muted: #7a9185;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: #c5f3c5;
    font-family: 'JetBrains Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #game-header {
    padding: 12px 24px;
    border-bottom: 1px solid var(--bg-lighter);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--chat-muted, #7a9185);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  #game-header .location {
    color: #f3a9c8;
    font-weight: 600;
  }

  #inventory-bar {
    color: var(--chat-muted, #7a9185);
  }

  #output {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    scroll-behavior: smooth;
  }

  #output::-webkit-scrollbar { width: 6px; }
  #output::-webkit-scrollbar-track { background: var(--bg); }
  #output::-webkit-scrollbar-thumb { background: var(--bg-lighter); border-radius: 3px; }

  .message {
    max-width: 720px;
    margin: 0 auto 20px;
    line-height: 1.7;
    white-space: pre-wrap;
    animation: fadeIn 0.3s ease;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.02em;
    color: #c5f3c5;
  }

  .message.command {
    color: #f7c2d9;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    opacity: 1;
  }

  .message.command::before {
    content: '> ';
    color: #f3a9c8;
  }

  .message.system {
    color: #7a9185;
    font-style: italic;
    font-size: 0.9rem;
  }

  .message .room-name {
    font-weight: 600;
    font-size: 1.1rem;
    color: #f3a9c8;
    display: block;
    margin-bottom: 8px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #input-area {
    border-top: 1px solid var(--bg-lighter);
    padding: 16px 24px;
    flex-shrink: 0;
  }

  #input-row {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #input-row::before {
    content: '>';
    font-family: 'JetBrains Mono', monospace;
    color: #f3a9c8;
    font-size: 1rem;
  }

  #command-input {
    flex: 1;
    background: transparent;
    border: none;
    color: #c5f3c5;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    outline: none;
    caret-color: #f3a9c8;
  }

  #command-input::placeholder {
    color: #7a9185;
    opacity: 0.7;
  }

  /* Chatroom styles */
  #chatroom {
    display: none;
    flex-direction: column;
    height: 100vh;
    background: radial-gradient(circle at top, var(--chat-bg-alt) 0%, var(--chat-bg) 55%, #040806 100%);
    color: var(--chat-green);
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  #chatroom.active {
    display: flex;
  }

  #chatroom.visible {
    opacity: 1;
  }

  #game-container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    transition: opacity 0.6s ease;
  }

  #game-container.hidden {
    display: none;
    opacity: 0;
  }

  #game-container.fade-out {
    opacity: 0;
  }

  #chat-header {
    padding: 18px 24px 14px;
    border-bottom: 1px solid rgba(243, 169, 200, 0.16);
    text-align: center;
  }

  #chat-header h2 {
    font-family: 'JetBrains Mono', monospace;
    color: var(--chat-pink);
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.06em;
  }

  #chat-header p {
    font-size: 0.8rem;
    color: var(--chat-green);
    max-width: 640px;
    margin: 6px auto 0;
    line-height: 1.5;
  }

  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }

  #chat-messages::-webkit-scrollbar { width: 6px; }
  #chat-messages::-webkit-scrollbar-track { background: transparent; }
  #chat-messages::-webkit-scrollbar-thumb { background: rgba(243, 169, 200, 0.3); border-radius: 3px; }

  .chat-msg {
    max-width: 720px;
    margin: 0 auto 14px;
    animation: fadeIn 0.3s ease;
  }

  .chat-msg .chat-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--chat-pink-soft);
    margin-bottom: 2px;
    letter-spacing: 0.04em;
  }

  .chat-msg .chat-text {
    font-size: 0.9rem;
    line-height: 1.6;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.03em;
    color: var(--chat-green);
  }

  .chat-msg .chat-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--chat-muted);
    margin-top: 2px;
  }

  /* System messages */
  .chat-system {
    text-align: center;
    font-style: italic;
    color: var(--chat-muted);
  }

  .chat-system .chat-name {
    display: none;
  }

  .chat-system .chat-text {
    color: var(--chat-muted);
    font-style: italic;
  }

  /* Messages sent by the current player */
  .chat-own .chat-name {
    color: var(--chat-pink);
  }

  .chat-own .chat-text {
    color: var(--chat-pink-soft);
  }

  #chat-input-area {
    border-top: 1px solid rgba(243, 169, 200, 0.18);
    padding: 16px 24px;
    background: linear-gradient(to top, rgba(0, 0, 0, 0.4), transparent);
  }

  #chat-input-row {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #chat-input {
    flex: 1;
    background: rgba(3, 12, 8, 0.95);
    border: 1px solid rgba(243, 169, 200, 0.25);
    border-radius: 999px;
    color: var(--chat-green);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.95rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }

  #chat-input::placeholder {
    color: rgba(197, 243, 197, 0.35);
  }

  #chat-input:focus {
    border-color: var(--chat-pink);
    box-shadow: 0 0 0 1px rgba(243, 169, 200, 0.55);
    background: rgba(4, 16, 10, 1);
  }

  #chat-send {
    background: var(--chat-pink);
    border: none;
    color: #200b12;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
    white-space: nowrap;
  }

  #chat-send:hover {
    background: #ffd2e5;
    transform: translateY(-1px);
  }

  #chat-send:active {
    transform: translateY(0);
  }

  /* Name modal */
  #name-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  #name-modal.active {
    display: flex;
  }

  #name-modal-inner {
    background: radial-gradient(circle at top, var(--chat-bg-alt) 0%, var(--chat-bg) 60%);
    padding: 32px 28px 28px;
    border-radius: 14px;
    text-align: center;
    max-width: 380px;
    width: 90%;
    box-shadow: 0 18px 45px rgba(0, 0, 0, 0.65);
    border: 1px solid rgba(243, 169, 200, 0.35);
  }

  #name-modal-inner h3 {
    color: var(--chat-pink);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 8px;
    font-size: 0.95rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  #name-modal-inner p {
    color: var(--chat-green);
    font-size: 0.9rem;
    margin-bottom: 16px;
  }

  #name-input {
    background: rgba(3, 12, 8, 0.95);
    border: 1px solid rgba(243, 169, 200, 0.4);
    border-radius: 999px;
    color: var(--chat-green);
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    padding: 10px 14px;
    width: 100%;
    outline: none;
    text-align: center;
    margin-bottom: 12px;
    transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }

  #name-input::placeholder {
    color: rgba(197, 243, 197, 0.35);
  }

  #name-input:focus {
    border-color: var(--chat-pink);
    box-shadow: 0 0 0 1px rgba(243, 169, 200, 0.55);
    background: rgba(4, 16, 10, 1);
  }

  #name-submit {
    background: var(--chat-pink);
    border: none;
    color: #200b12;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    padding: 10px 24px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
  }

  #name-submit:hover {
    background: #ffd2e5;
    transform: translateY(-1px);
  }

  #name-submit:active {
    transform: translateY(0);
  }
</style>
</head>
<body>

<!-- GAME -->
<div id="game-container">
  <div id="game-header">
    <span>THE COTTAGE — <span class="location" id="location-display">The Great Forest</span></span>
    <span id="inventory-bar">pockets: empty</span>
  </div>
  <div id="output"></div>
  <div id="input-area">
    <div id="input-row">
      <input type="text" id="command-input" placeholder="what do you do?" autofocus autocomplete="off" spellcheck="false">
    </div>
  </div>
</div>

<!-- CHATROOM -->
<div id="chatroom">
  <div id="chat-header">
    <h2>✧ The Guesthouse ✧</h2>
    <p>You made it! But do you think you just fell out of a coconut tree? You exist in the context of all in which you live and what came before you. Leave a note for your fellow adventurers!</p>
  </div>
  <div id="chat-messages"></div>
  <div id="chat-input-area">
    <div id="chat-input-row">
      <input type="text" id="chat-input" placeholder="say something..." autocomplete="off" spellcheck="false">
      <button id="chat-send">send</button>
    </div>
  </div>
</div>

<!-- NAME MODAL -->
<div id="name-modal">
  <div id="name-modal-inner">
    <h3>Welcome to the Guesthouse!</h3>
    <p>Name:</p>
    <input type="text" id="name-input" placeholder="your name" maxlength="24" autocomplete="off" spellcheck="false">
    <br>
    <button id="name-submit">enter</button>
  </div>
</div>

<script>
// ============================================================
// THE COTTAGE — Full Game Engine
// ============================================================

// --- ROOMS ---
const rooms = {
  outside: {
    name: "The Great Forest",
    description: `You find yourself standing outside a small cottage.

The front door is slightly ajar, and there's a ghost-scent of butter in the air.

You step up to the doormat and shuffle your feet across like any polite guest would do.

What's your next move?`,
    exits: { go: "foyer", open: "foyer", door: "foyer", "in": "foyer", inside: "foyer", cottage: "foyer", entrance: "foyer", forward: "foyer", north: "foyer" }
  },
  foyer: {
    name: "Foyer",
    description: `You find yourself in a small foyer. It's neither warm nor chilly, and you can sense that somebody has been here recently.

Yes, there was definitely butter happening here not long ago. And sugar.

Looking around, you can see a low wooden table with a small penlight.

There's a rug but not much else by way of furniture. Does anybody even live here?

In front of you, a Victorian spiral staircase leads up and up and up. Oddly, the ceiling appears higher than you would have thought possible, based on what you can recall about the cottage's façade. Weird.

To your left, there is a door. It is closed.

To your right, there is another door. It is also closed.`,
    exits: { up: "landing", upstairs: "landing", north: "landing", stairs: "landing", staircase: "landing", left: "kitchen", west: "kitchen", right: "living_room", east: "living_room", out: "outside", down: "outside", south: "outside" }
  },
  kitchen: {
    name: "Kitchen",
    description: `Okay, yes. This is where the butter was coming from.

A batch of scones lies on a round table in the centre of the room, which is evidently a kitchen.

A stove sits to your right. A fridge hums to your left, and the pantry door isn't fully closed.

Wow, those scones look fresh. Probably best not to take any without asking.

There doesn't seem to be much else here, just a random pole in the corner of the room. Makeshift strip club? Anything is possible at this point.`,
    exits: { east: "foyer", back: "foyer", door: "foyer", out: "foyer" }
  },
  living_room: {
    name: "Living Room",
    description: `You push the door open slowly, feeling apprehensive for no apparent reason. Except, well, maybe the trespassing thing.

There's some pressure coming from the other side, as if somebody, or something, is trying to push the door open from the other side.

A strange sensation hits your shoe. You look down.

To your great surprise, a flood of plastic balls breaks out of the room.

The room is a ballpit and everything is chartreuse. Yes, that greenish yellow colour nobody can quite decide whether they like or not.

You close the door hurriedly before the situation gets any worse. Nothing to see there!

Maybe we should go upstairs. There is still a puzzle to be solved.`,
    exits: { west: "foyer", back: "foyer", door: "foyer", out: "foyer" }
  },
  landing: {
    name: "Landing",
    description: `That took forever. You counted at least 288 steps.

It's actually kind of crazy how big this place is. Anyway.

You stand on an empty landing the size of a small swimming pool.

A small green tufted velvet bench is pressed against the wall to your right. It feels like a thoughtful reward for those suffering from spiral staircase-induced vertigo and/or fatigue.

The floor is slightly bouncy, as if there were springs installed under the carpeting.

The entire north wall, which you are facing, is made of glass.

On the other side of the sliding doors is a balcony looking out into a dense forest.

Based on the position of the sun, it appears to be about 3pm, which is strange, given it was 5pm when you entered.

To your left, there is a door. It is closed.

To your right, there is another door. It is also closed.`,
    exits: { north: "balcony", out: "balcony", forward: "balcony", left: "bedroom", west: "bedroom", right: "library", east: "library", down: "foyer", downstairs: "foyer", stairs: "foyer", staircase: "foyer" }
  },
  bedroom: {
    name: "Bedroom",
    description: `Ah, this must be the bedroom. It's the smallest room you've been in thus far, although you didn't really get a chance to gauge the size of the room to the east of the foyer.

Looking to your right, you can see a semi-circular bed tucked into the wall.

Looking straight ahead, there is a door which you assume leads to an ensuite bathroom.

To your left, there is a vanity, a full-length mirror, and a wardrobe.

You do a quick yodel for some reason. Not quite sure what came over you. The acoustics in here aren't what you expected.

It seems to be a pretty standard bedroom otherwise, though.`,
    exits: { bathroom: "bathroom", west: "bathroom", forward: "bathroom", hall: "landing", east: "landing", landing: "landing", back: "landing" }
  },
  bathroom: {
    name: "Bathroom",
    description: `Hey, you had a feeling this was a bathroom and you were right.

If you need to pee, then you need to pee. Nature calls.

If you don't need to pee, then come on, let's go back into the bedroom.`,
    exits: { out: "bedroom", east: "bedroom", bedroom: "bedroom", back: "bedroom" }
  },
  balcony: {
    name: "Balcony",
    description: `The sun is setting and there's a strong wind coming from the east.

You're standing on a narrow balcony. The air is cold but the sense of adventure keeps you from feeling any discomfort.

Looking into the forest, you see nothing but trees almost Sequoian in their reach. They feel friendlier than one might typically think such a vast maze.

A crow lands on the railing. It squawks and releases a crumpled piece of paper from its beak before flying away.`,
    exits: { landing: "landing", inside: "landing", "in": "landing", south: "landing", back: "landing" }
  },
  library: {
    name: "Library",
    description: `You breathe in and close your eyes. Ah. Yes. Books.

You stand in the entrance of the dimly-lit reading room.

The air feels pregnant with prose, but you've always been charmingly pretentious, so maybe you're imagining things. Luckily, imagination is important for greatness.

Two patchwork armchairs face each other in the centre of the space, as if they were put together by one person as a makeshift chaise longue.

There aren't many books lining the shelves, maybe twelve or so, but it's hard to tell from the other side of the room.`,
    exits: { west: "landing", back: "landing" }
  }
};

// --- GAME STATE ---
const state = {
  currentRoom: "outside",
  inventory: [],          // items player is carrying
  hasPen: false,
  penClicked: false,      // player knows it's a UV light
  hasNote: false,
  noteRevealed: false,    // UV pen used on note
  sconeEaten: false,
  fridgeOpened: false,
  fridgeLocked: false,    // locked after ketchup attempt
  pantryOpened: false,
  pantryOpenedTwice: false,
  jumpCount: 0,
  leverRevealed: false,   // pulled Never Let Me Go
  leverPulled: false,
  shoesRemoved: false,
  doorDisappeared: false,  // tried to leave after entering
  pooInsist: false,
  visitedFoyer: false,
};

const cantDoMessages = [
  "The laws of The Cottage prevent this. Try something else!",
  "Nothing happens :(",
  "Girl what are you trying to do here",
  "Ah, you can't do that here. Got a backup plan?",
  "Interesting idea, but unfortunately, no can do.",
  "You try, but the universe doesn't budge.",
  "Good idea, but alas, no puedes.",
  "The Machine doesn't know what you mean by that. Try again."
];

// --- DOM REFS ---
const outputEl = document.getElementById('output');
const inputEl = document.getElementById('command-input');
const locationEl = document.getElementById('location-display');
const inventoryBarEl = document.getElementById('inventory-bar');

// --- HELPERS ---
function randomCant() {
  return cantDoMessages[Math.floor(Math.random() * cantDoMessages.length)];
}

function print(text, cls = '') {
  const div = document.createElement('div');
  div.className = 'message ' + cls;
  div.textContent = text;
  outputEl.appendChild(div);
  outputEl.scrollTop = outputEl.scrollHeight;
}

function printRoom(roomId) {
  const r = rooms[roomId];
  const div = document.createElement('div');
  div.className = 'message';
  const nameSpan = document.createElement('span');
  nameSpan.className = 'room-name';
  nameSpan.textContent = r.name;
  div.appendChild(nameSpan);
  div.appendChild(document.createTextNode(r.description));
  outputEl.appendChild(div);
  outputEl.scrollTop = outputEl.scrollHeight;
  locationEl.textContent = r.name;
}

function updateInventory() {
  if (state.inventory.length === 0) {
    inventoryBarEl.textContent = 'pockets: empty';
  } else {
    inventoryBarEl.textContent = 'pockets: ' + state.inventory.join(', ');
  }
}

function hasItem(item) {
  return state.inventory.includes(item);
}

function addItem(item) {
  if (!state.inventory.includes(item)) {
    state.inventory.push(item);
    updateInventory();
  }
}

function removeItem(item) {
  state.inventory = state.inventory.filter(i => i !== item);
  updateInventory();
}

function moveTo(roomId) {
  state.currentRoom = roomId;
  printRoom(roomId);

  // Track foyer visit for door disappearing
  if (roomId === 'foyer' && !state.visitedFoyer) {
    state.visitedFoyer = true;
  }
}

// --- INTRO ---
print(`Welcome to The Cottage!

To make your way through the story:
- Type directions to move (think north, left, up, back)
- 'look' or 'l' to inspect your surroundings
- 'examine [thing]' or 'x [thing]' to inspect things
- 'take [thing]' to pick things up
- 'inventory' or 'i' to check your pockets
- Think sideways, you never know what you might find

There's a puzzle waiting to be solved! Good luck ;)

— M

✧･ﾟ: *✧･ﾟ:*  *:･ﾟ✧*:･ﾟ✧`, 'system');

printRoom('outside');

// --- COMMAND MATCHING HELPERS ---
function cmdIncludes(cmd, ...terms) {
  return terms.some(t => cmd.includes(t));
}

function cmdMatch(words, ...patterns) {
  // Check if any pattern matches the words array
  return patterns.some(p => {
    const pts = p.split(' ');
    return pts.every(pt => words.includes(pt));
  });
}

// --- BOOK DATA ---
const bookResponses = {
  pachinko: `A handwritten message on the blank first page of the book reads:

"An instant classic, a modern epic. Incredibly well-developed characters. Pachinko is a must-read for all, but be warned that you will experience intense cravings for banchan."`,

  "never let me go": `A handwritten message on the blank first page of the book reads:

"Perhaps one of the greatest novels published this century, Never Let Me Go is as haunting as it is heart-wrenching. Sci-fi, coming-of-age, romance, tragedy, all wrapped up into a Promethean snowball."

You feel the ground shake slightly, and look to the spot in the bookshelf that you just pulled Ishiguro's masterpiece from. A shining golden lever glints at you as if it were smiling.`,

  "the unreal and the real": `A handwritten message on the blank first page of the book reads:

"Le Guin writes characters as if seeing them through paned glass. She creates a clear-as-day image, but the barrier between them and the reader is evident.

Many of the short stories therein are not immediately striking, but often resurface in my thoughts after some time. I think of that as one sign of great fiction. Something about The Unreal and the Real makes me feel both like crying and as if I'm otherworldly — great mix!"`,

  "being mortal": `A handwritten message on the blank first page of the book reads:

"The world is always changing, but there are even more of us witnessing those changes over time. We're living to see so many more years, and this is both beautiful and terrifying. Being Mortal is a must-read for all."`,

  "the story of a new name": `A handwritten message on the blank first page of the book reads:

"Ferrante can do no wrong."`
};

// --- MAIN COMMAND PROCESSOR ---
function processCommand(rawInput) {
  const cmd = rawInput.trim().toLowerCase();
  if (!cmd) return;

  print(rawInput, 'command');

  const words = cmd.split(/\s+/);
  const verb = words[0];
  const rest = words.slice(1).join(' ');
  const room = state.currentRoom;
  const exits = rooms[room].exits;

  // --- INVENTORY ---
  if (verb === 'inventory' || verb === 'i' || cmd === 'check pockets' || cmd === 'pockets') {
    if (state.inventory.length === 0) {
      print("Your pockets are empty. For now.");
    } else {

function enterChatroom() {
  const game = document.getElementById('game-container');
  const chat = document.getElementById('chatroom');

  // Fade out the game, then fade in the chatroom
  game.classList.add('fade-out');

  setTimeout(() => {
    game.classList.add('hidden');
    game.classList.remove('fade-out');

    chat.classList.add('active');

    // Allow layout to apply before fading in
    requestAnimationFrame(() => {
      chat.classList.add('visible');
    });

    document.getElementById('name-modal').classList.add('active');
    document.getElementById('name-input').focus();
  }, 600);
}

// Name modal
document.getElementById('name-submit').addEventListener('click', submitName);
document.getElementById('name-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') submitName();
});

function submitName() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) return;
  chatUsername = name;
  document.getElementById('name-modal').classList.remove('active');
  document.getElementById('chat-input').focus();
  initChat();
}

async function initChat() {
  // If Supabase credentials aren't configured, use a local-only fallback
  if (!SUPABASE_URL || SUPABASE_URL === 'YOUR_SUPABASE_URL') {
    addChatMessage('system', 'You solved The Cottage! Chatroom coming soon.', new Date());
    return;
  }

  // Load Supabase client
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
  script.onload = () => {
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Load existing messages
    loadMessages(supabase);

    // Subscribe to new messages via Realtime
    chatChannel = supabase.channel('guesthouse')
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'messages'
      }, (payload) => {
        const msg = payload.new;
        addChatMessage(msg.username, msg.content, new Date(msg.created_at));
      })
      .subscribe();

    // Send message handler
    window.sendChatMessage = async (content) => {
      await supabase.from('messages').insert({
        username: chatUsername,
        content: content
      });
    };
  };
  document.head.appendChild(script);
}

async function loadMessages(supabase) {
  const { data, error } = await supabase
    .from('messages')
    .select('*')
    .order('created_at', { ascending: true })
    .limit(200);

  if (data) {
    data.forEach(msg => {
      addChatMessage(msg.username, msg.content, new Date(msg.created_at));
    });
  }

  const { error: joinError } = await supabase
    .from('messages')
    .insert({
      username: 'system',
      content: `${chatUsername} has entered the Guesthouse`
    });

  if (joinError) {
    // If the insert fails, still show a local system message
    addChatMessage('system', `${chatUsername} has entered the Guesthouse`, new Date());
  }
}

function addChatMessage(name, text, date) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  const isSystem = name === 'system';
  const isOwn = !isSystem && name === chatUsername;
  div.className = isSystem ? 'chat-msg chat-system' : isOwn ? 'chat-msg chat-own' : 'chat-msg';

  if (!isSystem) {
    const nameEl = document.createElement('div');
    nameEl.className = 'chat-name';
    nameEl.textContent = name;

    const textEl = document.createElement('div');
    textEl.className = 'chat-text';
    textEl.textContent = text;

    const timeEl = document.createElement('div');
    timeEl.className = 'chat-time';
    timeEl.textContent = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    div.appendChild(nameEl);
    div.appendChild(textEl);
    div.appendChild(timeEl);
  } else {
    const textEl = document.createElement('div');
    textEl.className = 'chat-text';
    textEl.textContent = text;

    const timeEl = document.createElement('div');
    timeEl.className = 'chat-time';
    timeEl.textContent = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    div.appendChild(textEl);
    div.appendChild(timeEl);
  }
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// Chat input
document.getElementById('chat-send').addEventListener('click', sendChat);
document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendChat();
});

function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  if (window.sendChatMessage) {
    window.sendChatMessage(text);
  } else {
    // Fallback: local only
    addChatMessage(chatUsername, text, new Date());
  }
}
