  <script>
    // Cat photo click toggle animation
    document.addEventListener('DOMContentLoaded', function(){
      var catLink = document.getElementById('cat-link');
      var catPhoto = document.getElementById('cat-photo');
      var isClicked = false;
      if(catLink && catPhoto){
        catLink.addEventListener('click', function(e){
          e.preventDefault();
          if(isClicked){
            catPhoto.src = 'images/alixwithcats.png?v=1770315599';
          } else {
            catPhoto.src = 'images/alixwithcats-click.png?v=1770315599';
          }
          isClicked = !isClicked;
        });
      }
    });
  </script>

  <div id="disco-overlay"></div>
  <script>
const konamiCode = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'KeyB', 'KeyA'];
let konamiIndex = 0;

document.addEventListener('keydown', (e) => {
  if (e.code === konamiCode[konamiIndex]) {
    konamiIndex++;
    if (konamiIndex === konamiCode.length) {
      const disco = document.getElementById('disco-overlay');
      disco.classList.add('active');
      console.log("%c🕺 DISCO MODE ACTIVATED 🕺", "font-size: 24px; color: hotpink; font-weight: bold;");
      
      setTimeout(() => {
        disco.classList.remove('active');
      }, 8000);
      
      konamiIndex = 0;
    }
  } else {
    konamiIndex = 0;
  }
});
  </script>
